<script type="text/babel">
const { useState, useMemo, useRef, useCallback, useEffect } = React;

// ── TERMS (21) ─────────────────────────────────────────────────────────────
const TERMS = [
  { id:1,  type:'red',    icon:'fa-solid fa-file-pen',
    name:{en:'PWN',es:'PWN'}, alt:{en:'Prior Written Notice',es:'Aviso Previo por Escrito'},
    def:{en:'The school must provide written explanation of any proposed change, refusal, or action before it takes effect. This document must state what the school proposes or refuses to do, why, and what other options were considered (34 CFR § 300.503).',
         es:'La escuela debe dar explicación escrita de cualquier cambio, negativa o acción propuesta antes de que surta efecto. Debe indicar qué propone o rechaza la escuela, por qué y qué otras opciones se consideraron (34 CFR § 300.503).'}},
  { id:2,  type:'red',    icon:'fa-solid fa-shield-halved',
    name:{en:'Stay Put',es:'Stay Put'}, alt:{en:'Maintenance of Placement',es:'Mantenimiento de Ubicación'},
    def:{en:'While a due process complaint or legal dispute is pending, your child\'s current educational placement must remain unchanged — unless you and the school agree otherwise. This protection prevents schools from moving children during disputes (20 U.S.C. § 1415(j)).',
         es:'Mientras una queja de debido proceso o disputa legal esté pendiente, la colocación educativa actual de su hijo no puede cambiar, a menos que usted y la escuela acuerden lo contrario. Esta protección impide que las escuelas muevan a los niños durante las disputas (20 U.S.C. § 1415(j)).'}},
  { id:3,  type:'red',    icon:'fa-solid fa-gavel',
    name:{en:'Due Process',es:'Debido Proceso'}, alt:{en:'Legal Hearing',es:'Audiencia Legal'},
    def:{en:'A formal hearing conducted by an impartial hearing officer to resolve disputes between parents and the school district regarding identification, evaluation, placement, or the provision of FAPE. Either party may appeal the decision (34 CFR § 300.511).',
         es:'Una audiencia formal dirigida por un funcionario imparcial para resolver disputas entre los padres y el distrito escolar sobre identificación, evaluación, colocación o la provisión de FAPE. Cualquiera de las partes puede apelar la decisión (34 CFR § 300.511).'}},
  { id:4,  type:'red',    icon:'fa-regular fa-file-lines',
    name:{en:'Procedural Safeguards',es:'Garantías Procesales'}, alt:{en:'Parental Rights Handbook',es:'Manual de Derechos'},
    def:{en:'The official document the school must provide at least once a year explaining every legal protection you hold under IDEA — including your rights to consent, review records, request evaluations, file complaints, and dispute decisions (20 U.S.C. § 1415(d)).',
         es:'El documento oficial que la escuela debe proporcionar al menos una vez al año explicando cada protección legal que tiene bajo IDEA, incluyendo sus derechos de consentimiento, revisión de registros, solicitar evaluaciones, presentar quejas e impugnar decisiones (20 U.S.C. § 1415(d)).'}},
  { id:5,  type:'red',    icon:'fa-solid fa-shield-heart',
    name:{en:'MDR',es:'MDR'}, alt:{en:'Manifestation Determination Review',es:'Revisión de Determinación de Manifestación'},
    def:{en:'A mandatory meeting within 10 school days when a student with a disability faces a disciplinary removal of more than 10 days. The team must determine whether the behavior was caused by, or had a direct and substantial relationship to, the disability (34 CFR § 300.530(e)).',
         es:'Una reunión obligatoria dentro de 10 días escolares cuando un estudiante con discapacidad enfrenta una remoción disciplinaria de más de 10 días. El equipo debe determinar si el comportamiento fue causado por la discapacidad o tuvo relación directa y sustancial con ella (34 CFR § 300.530(e)).'}},
  { id:6,  type:'red',    icon:'fa-solid fa-magnifying-glass-chart',
    name:{en:'IEE',es:'IEE'}, alt:{en:'Independent Educational Evaluation',es:'Evaluación Educativa Independiente'},
    def:{en:'Your right to obtain an evaluation by a qualified evaluator outside the school district — at public expense — when you disagree with the school\'s evaluation. The school must consider the IEE results. Schools may only deny an IEE by requesting a due process hearing to defend their evaluation (34 CFR § 300.502).',
         es:'Su derecho a obtener una evaluación por un evaluador calificado fuera del distrito escolar, a cargo del público, cuando no está de acuerdo con la evaluación de la escuela. La escuela debe considerar los resultados. Las escuelas solo pueden negar una IEE solicitando una audiencia de debido proceso (34 CFR § 300.502).'}},
  { id:7,  type:'red',    icon:'fa-solid fa-handshake',
    name:{en:'Mediation',es:'Mediación'}, alt:{en:'Voluntary Dispute Resolution',es:'Resolución Voluntaria de Disputas'},
    def:{en:'A free, voluntary, confidential process in which a trained, impartial mediator helps parents and the school district reach a mutually agreeable resolution. Mediation does not delay or waive your right to a due process hearing. Any agreement reached is legally binding and enforceable in court (34 CFR § 300.506).',
         es:'Un proceso gratuito, voluntario y confidencial en el que un mediador imparcial y capacitado ayuda a los padres y al distrito a alcanzar una resolución mutuamente aceptable. La mediación no retrasa ni renuncia a su derecho a una audiencia de debido proceso. Cualquier acuerdo alcanzado es legalmente vinculante (34 CFR § 300.506).'}},

  { id:8,  type:'yellow', icon:'fa-solid fa-graduation-cap',
    name:{en:'FAPE',es:'FAPE'}, alt:{en:'Free Appropriate Public Education',es:'Educación Pública Gratuita y Apropiada'},
    def:{en:'The core guarantee of IDEA: every eligible child with a disability is entitled to special education and related services that are provided at no cost, meet the state educational standards, include preschool through secondary education, and are provided in conformity with the child\'s IEP (20 U.S.C. § 1401(9)).',
         es:'La garantía central de IDEA: todo niño elegible con una discapacidad tiene derecho a recibir educación especial y servicios relacionados sin costo alguno, que cumplan con los estándares educativos estatales y se proporcionen de conformidad con el IEP del niño (20 U.S.C. § 1401(9)).'}},
  { id:9,  type:'yellow', icon:'fa-solid fa-house',
    name:{en:'LRE',es:'LRE'}, alt:{en:'Least Restrictive Environment',es:'Entorno Menos Restrictivo'},
    def:{en:'IDEA requires that children with disabilities be educated with non-disabled children to the maximum extent appropriate. Removal from regular educational settings may only occur when the nature or severity of the disability is such that education with supplementary aids and services cannot be achieved satisfactorily (34 CFR § 300.114).',
         es:'IDEA requiere que los niños con discapacidades sean educados con niños sin discapacidades en la mayor medida apropiada. La remoción de entornos educativos regulares solo puede ocurrir cuando la naturaleza de la discapacidad es tal que la educación con ayudas y servicios complementarios no puede lograrse satisfactoriamente (34 CFR § 300.114).'}},
  { id:10, type:'yellow', icon:'fa-solid fa-chart-line',
    name:{en:'PLAAFP',es:'PLAAFP'}, alt:{en:'Present Levels of Academic Achievement and Functional Performance',es:'Niveles Actuales de Desempeño'},
    def:{en:'The foundation of the entire IEP — a data-driven description of your child\'s current functioning across academic and functional domains. Must include how the disability affects the child\'s involvement in the general curriculum and must be updated annually based on objective assessment data.',
         es:'La base de todo el IEP: una descripción basada en datos del funcionamiento actual de su hijo en dominios académicos y funcionales. Debe incluir cómo la discapacidad afecta la participación del niño en el plan de estudios general y debe actualizarse anualmente.'}},
  { id:11, type:'yellow', icon:'fa-solid fa-desktop',
    name:{en:'Accommodations',es:'Acomodaciones'}, alt:{en:'How the Child Learns',es:'Cómo Aprende el Niño'},
    def:{en:'Supports and services that change HOW a child accesses and demonstrates learning — such as extended time, preferential seating, oral testing, large print, or assistive technology — without changing the academic standards or content being taught.',
         es:'Apoyos y servicios que cambian CÓMO un niño accede y demuestra el aprendizaje, como tiempo extendido, asientos preferenciales, exámenes orales o tecnología de asistencia, sin cambiar los estándares académicos ni el contenido que se enseña.'}},
  { id:12, type:'yellow', icon:'fa-solid fa-book-open',
    name:{en:'Modifications',es:'Modificaciones'}, alt:{en:'What the Child Learns',es:'Qué Aprende el Niño'},
    def:{en:'Changes to WHAT a child is taught or expected to master — fundamentally altering the grade-level academic standard. Examples include reducing the number of assignments, simplifying reading materials, or changing the scope of assessment. Unlike accommodations, modifications change the learning expectation itself.',
         es:'Cambios en QUÉ se enseña o se espera que domine un niño, alterando fundamentalmente el estándar académico de nivel de grado. Ejemplos: reducir el número de tareas, simplificar materiales de lectura o cambiar el alcance de la evaluación.'}},
  { id:13, type:'yellow', icon:'fa-solid fa-bullseye',
    name:{en:'Annual Goals',es:'Metas Anuales'}, alt:{en:'Measurable IEP Targets',es:'Objetivos Medibles del IEP'},
    def:{en:'Written, measurable targets in the IEP describing what your child can reasonably be expected to accomplish in one year, given the right instruction and support. Goals must be directly based on the PLAAFP, address the child\'s unique needs, and be ambitious enough to reflect meaningful progress per the Endrew F. standard.',
         es:'Objetivos escritos y medibles en el IEP que describen lo que se puede esperar razonablemente que su hijo logre en un año con la instrucción y el apoyo correctos. Las metas deben basarse directamente en el PLAAFP y ser lo suficientemente ambiciosas para reflejar un progreso significativo.'}},
  { id:14, type:'yellow', icon:'fa-solid fa-calendar-plus',
    name:{en:'ESY',es:'ESY'}, alt:{en:'Extended School Year',es:'Año Escolar Extendido'},
    def:{en:'Special education and related services provided beyond the regular school calendar for a student whose IEP team determines they would otherwise experience significant skill regression during extended breaks. ESY cannot be denied solely to save money. Eligibility is individualized — not blanket-applied to disability category (34 CFR § 300.106).',
         es:'Educación especial y servicios relacionados más allá del calendario escolar regular para un estudiante cuyo equipo del IEP determina que de lo contrario experimentaría una regresión significativa de habilidades durante los recesos. No se puede negar solo para ahorrar dinero (34 CFR § 300.106).'}},

  { id:15, type:'green',  icon:'fa-solid fa-chalkboard-user',
    name:{en:'SDI',es:'SDI'}, alt:{en:'Specially Designed Instruction',es:'Instrucción Especialmente Diseñada'},
    def:{en:'Instruction that adapts — as appropriate — the content, methodology, or delivery of instruction to address the unique needs resulting from the child\'s disability and to ensure access to the general curriculum. SDI is the heart of special education and must be provided by a qualified special education teacher.',
         es:'Instrucción que adapta, según sea apropiado, el contenido, la metodología o la entrega de la instrucción para abordar las necesidades únicas resultantes de la discapacidad del niño y garantizar el acceso al plan de estudios general. La SDI es el núcleo de la educación especial.'}},
  { id:16, type:'green',  icon:'fa-solid fa-magnifying-glass',
    name:{en:'FBA',es:'FBA'}, alt:{en:'Functional Behavior Assessment',es:'Evaluación Funcional del Comportamiento'},
    def:{en:'A structured, data-based evaluation to identify the function — the WHY — behind a challenging behavior. Examines antecedents (triggers), the behavior itself, and consequences (what the child gains from it). Required when behavior impedes learning. The FBA\'s findings must directly inform the development of the BIP.',
         es:'Una evaluación estructurada y basada en datos para identificar la función, el POR QUÉ, detrás de un comportamiento desafiante. Examina los antecedentes (desencadenantes), el comportamiento en sí y las consecuencias (qué gana el niño con ello). Obligatorio cuando el comportamiento impide el aprendizaje.'}},
  { id:17, type:'green',  icon:'fa-solid fa-bolt',
    name:{en:'BIP',es:'BIP'}, alt:{en:'Behavior Intervention Plan',es:'Plan de Intervención de Comportamiento'},
    def:{en:'A proactive, positive behavior support plan built directly from FBA findings. Must identify the function of the behavior, environmental modifications, replacement behaviors to be taught, reinforcement strategies, and how all staff should respond consistently. A BIP is a legal document — schools cannot deviate from it without IEP team review.',
         es:'Un plan de apoyo conductual positivo y proactivo construido directamente a partir de los hallazgos del FBA. Debe identificar la función del comportamiento, modificaciones ambientales, comportamientos de reemplazo a enseñar y estrategias de refuerzo. Un BIP es un documento legal.'}},
  { id:18, type:'green',  icon:'fa-solid fa-users',
    name:{en:'RBT',es:'RBT'}, alt:{en:'Registered Behavior Technician',es:'Técnico de Comportamiento Registrado'},
    def:{en:'A paraprofessional who has completed the BACB\'s Registered Behavior Technician training and provides 1-on-1 implementation of behavior intervention plans under the direct supervision of a Board Certified Behavior Analyst (BCBA). If your child\'s BIP specifies RBT support, the school is legally required to provide it.',
         es:'Un paraprofesional que ha completado la capacitación de Técnico de Comportamiento Registrado del BACB y proporciona implementación 1 a 1 de planes de intervención conductual bajo la supervisión directa de un analista certificado (BCBA).'}},
  { id:19, type:'green',  icon:'fa-solid fa-scale-balanced',
    name:{en:'Meaningful Progress',es:'Progreso Significativo'}, alt:{en:'Endrew F. Standard',es:'Estándar Endrew F.'},
    def:{en:'The standard established by the Supreme Court in Endrew F. v. Douglas County (2017): every IEP must be "reasonably calculated to enable a child to make progress appropriate in light of the child\'s circumstances." The Court explicitly rejected "de minimis" or trivially advancing IEPs as insufficient under IDEA.',
         es:'El estándar establecido por la Corte Suprema en Endrew F. v. Douglas County (2017): cada IEP debe estar "razonablemente calculado para permitir que un niño progrese apropiadamente a la luz de sus circunstancias". La Corte rechazó explícitamente los IEP de avance trivial.'}},
  { id:20, type:'green',  icon:'fa-regular fa-message',
    name:{en:'FCT',es:'FCT'}, alt:{en:'Functional Communication Training',es:'Entrenamiento en Comunicación Funcional'},
    def:{en:'An evidence-based intervention that teaches a student to communicate needs, wants, or feelings through an appropriate, functionally equivalent replacement behavior — such as words, pictures, gestures, or an AAC device — instead of through a challenging behavior that serves the same communicative function.',
         es:'Una intervención basada en evidencia que enseña a un estudiante a comunicar necesidades, deseos o sentimientos a través de un comportamiento de reemplazo apropiado y funcionalmente equivalente, como palabras, imágenes, gestos o un dispositivo AAC, en lugar de a través de un comportamiento desafiante.'}},
  { id:21, type:'green',  icon:'fa-solid fa-chart-bar',
    name:{en:'Progress Monitoring',es:'Monitoreo del Progreso'}, alt:{en:'Ongoing Data Collection',es:'Recopilación de Datos Continua'},
    def:{en:'The regular, systematic measurement of your child\'s progress toward each IEP goal. The school is legally required to report progress to parents at least as often as it reports to parents of non-disabled students — typically quarterly. If data shows insufficient progress, the IEP team must reconvene and adjust.',
         es:'La medición regular y sistemática del progreso de su hijo hacia cada meta del IEP. La escuela está legalmente obligada a reportar el progreso a los padres con la misma frecuencia con que lo hace para padres de estudiantes sin discapacidades. Si los datos muestran progreso insuficiente, el equipo del IEP debe reunirse para ajustar.'}},
];

// ── 12 ACTION SCRIPTS ────────────────────────────────────────────────────────
const SCENARIOS = [
  { id:101, cat:'progress',
    iconCls:'fa-solid fa-scale-balanced text-3xl text-emerald-500',
    feeling:{en:'"My child has had the exact same reading and math goals for three years."',es:'"Mi hijo ha tenido las mismas metas de lectura y matemáticas durante tres años."'},
    connection:{en:'Identical goals year after year indicate "de minimis" progress — the standard explicitly rejected by the Supreme Court in Endrew F. v. Douglas County (2017). Goals must reflect current performance levels and be "appropriately ambitious."',es:'Las metas idénticas año tras año indican un progreso "de minimis", el estándar explícitamente rechazado por la Corte Suprema en Endrew F. (2017). Las metas deben reflejar los niveles de rendimiento actuales.'},
    action:{en:'I am requesting an IEP revision meeting within 30 days to update my child\'s goals based on current PLAAFP data. Under Endrew F., I expect goals that are "appropriately ambitious" and calculated for real progress, not minimal advancement.',es:'Solicito una reunión de revisión del IEP dentro de 30 días para actualizar las metas de mi hijo basadas en datos actuales del PLAAFP. Bajo Endrew F., espero metas que sean "apropiadamente ambiciosas" y calculadas para un progreso real.'}},

  { id:102, cat:'services',
    iconCls:'fa-solid fa-triangle-exclamation text-3xl text-amber-500',
    feeling:{en:'"The school told me they can\'t afford the service my child needs."',es:'"La escuela me dijo que no puede costear el servicio que mi hijo necesita."'},
    connection:{en:'Cost is never a legal justification for denying a required service under IDEA. FAPE must be provided at no cost to the family regardless of the school\'s budget constraints. A service included in the IEP is a legal obligation (34 CFR § 300.17).',es:'El costo nunca es justificación legal para negar un servicio requerido bajo IDEA. La FAPE debe proporcionarse sin costo para la familia independientemente de las restricciones presupuestarias de la escuela. Un servicio incluido en el IEP es una obligación legal (34 CFR § 300.17).'},
    action:{en:'I am formally notifying the district that financial limitations are not a legally permissible basis for denying FAPE. I am requesting written confirmation within 5 business days of when the required service will begin, or a Prior Written Notice explaining the refusal.',es:'Notifico formalmente al distrito que las limitaciones financieras no son una base legalmente permisible para negar la FAPE. Solicito confirmación escrita dentro de 5 días hábiles de cuándo comenzará el servicio requerido, o un Aviso Previo por Escrito explicando la negativa.'}},

  { id:103, cat:'placement',
    iconCls:'fa-solid fa-house text-3xl text-violet-500',
    feeling:{en:'"The school wants to move my child to a more restrictive classroom setting."',es:'"La escuela quiere mover a mi hijo a un entorno de aula más restrictivo."'},
    connection:{en:'Any placement change requires a Prior Written Notice explaining why, what was considered, and what data supports the decision. IDEA requires placement in the Least Restrictive Environment — the school must demonstrate that education in a less restrictive setting cannot be achieved satisfactorily (34 CFR § 300.114).',es:'Cualquier cambio de colocación requiere un Aviso Previo por Escrito. IDEA requiere colocación en el Entorno Menos Restrictivo: la escuela debe demostrar que la educación en un entorno menos restrictivo no puede lograrse satisfactoriamente (34 CFR § 300.114).'},
    action:{en:'I do not consent to this placement change at this time. I am requesting a Prior Written Notice with the specific data, documentation, and supplementary aids and services that were considered and attempted before this recommendation. I am also requesting a copy of my child\'s most recent evaluation data.',es:'No doy mi consentimiento a este cambio de colocación en este momento. Solicito un Aviso Previo por Escrito con los datos específicos y las ayudas y servicios suplementarios que se consideraron y probaron antes de esta recomendación.'}},

  { id:104, cat:'behavior',
    iconCls:'fa-solid fa-shield-halved text-3xl text-red-500',
    feeling:{en:'"The school keeps calling me to pick up my child early because of behavior."',es:'"La escuela me sigue llamando para recoger a mi hijo temprano debido a su comportamiento."'},
    connection:{en:'Repeated early dismissals due to behavior constitute an informal or "de facto" suspension. Under IDEA, when behavior impedes a student\'s learning, the IEP team must consider positive behavioral interventions and supports — not exclusion. Informal removals can trigger disciplinary protections.',es:'Las salidas tempranas repetidas debido al comportamiento constituyen una suspensión informal o "de facto". Bajo IDEA, cuando el comportamiento impide el aprendizaje, el equipo del IEP debe considerar intervenciones conductuales positivas, no la exclusión.'},
    action:{en:'I am requesting that the school immediately document the number and duration of all early dismissals. I am formally requesting an FBA to identify the function of this behavior and the development of a BIP. If these dismissals total more than 10 days, I am requesting a Manifestation Determination Review.',es:'Solicito que la escuela documente inmediatamente el número y la duración de todas las salidas tempranas. Solicito formalmente una FBA y el desarrollo de un BIP. Si estas salidas suman más de 10 días, solicito una Revisión de Determinación de Manifestación.'}},

  { id:105, cat:'evaluation',
    iconCls:'fa-solid fa-magnifying-glass-chart text-3xl text-sky-500',
    feeling:{en:'"The school says my child doesn\'t need to be evaluated for special education."',es:'"La escuela dice que mi hijo no necesita ser evaluado para educación especial."'},
    connection:{en:'Under IDEA\'s "Child Find" mandate, schools are required to identify, locate, and evaluate all children who may need special education services — regardless of whether the family requests it. If the school refuses to evaluate, they must provide written notice and you may disagree through due process (34 CFR § 300.111).',es:'Bajo el mandato de "Child Find" de IDEA, las escuelas están obligadas a identificar, localizar y evaluar a todos los niños que puedan necesitar servicios de educación especial. Si la escuela se niega a evaluar, debe proporcionar aviso escrito (34 CFR § 300.111).'},
    action:{en:'I am making a formal written request for a full and individual evaluation of my child in all areas of suspected disability. I understand the school has 60 days to complete the evaluation. If the school refuses, I am requesting a Prior Written Notice explaining the refusal and I will pursue my right to dispute this decision.',es:'Hago una solicitud formal por escrito para una evaluación completa e individual de mi hijo en todas las áreas de posible discapacidad. Entiendo que la escuela tiene 60 días para completar la evaluación. Si la escuela se niega, solicito un Aviso Previo por Escrito.'}},

  { id:106, cat:'evaluation',
    iconCls:'fa-solid fa-file-circle-question text-3xl text-indigo-500',
    feeling:{en:'"I don\'t agree with the school\'s evaluation results."',es:'"No estoy de acuerdo con los resultados de evaluación de la escuela."'},
    connection:{en:'When you disagree with the school\'s evaluation, you have the right to an Independent Educational Evaluation (IEE) at public expense. The school may either agree to fund the IEE or file for due process to defend their evaluation — they cannot simply deny your request without taking one of these steps (34 CFR § 300.502).',es:'Cuando no está de acuerdo con la evaluación de la escuela, tiene derecho a una Evaluación Educativa Independiente (IEE) a cargo del público. La escuela debe acordar financiar la IEE o solicitar debido proceso para defender su evaluación (34 CFR § 300.502).'},
    action:{en:'I am formally requesting an Independent Educational Evaluation at public expense. I disagree with the school\'s evaluation because [reason]. I understand the school must either provide the IEE or initiate due process to prove their evaluation was appropriate. I am requesting a response in writing within 5 business days.',es:'Solicito formalmente una Evaluación Educativa Independiente a cargo del público. No estoy de acuerdo con la evaluación de la escuela porque [razón]. Entiendo que la escuela debe proporcionar la IEE o iniciar el debido proceso. Solicito respuesta por escrito dentro de 5 días hábiles.'}},

  { id:107, cat:'discipline',
    iconCls:'fa-solid fa-gavel text-3xl text-red-600',
    feeling:{en:'"The school is threatening to suspend or expel my child because of their behavior."',es:'"La escuela amenaza con suspender o expulsar a mi hijo por su comportamiento."'},
    connection:{en:'Students with disabilities have specific protections under IDEA before significant disciplinary action. For removals exceeding 10 school days or a change in placement, the school must conduct a Manifestation Determination Review. If the behavior is a manifestation of the disability, expulsion is generally prohibited (34 CFR § 300.530).',es:'Los estudiantes con discapacidades tienen protecciones específicas bajo IDEA antes de una acción disciplinaria significativa. Para remociones que excedan 10 días escolares, la escuela debe realizar una Revisión de Determinación de Manifestación (34 CFR § 300.530).'},
    action:{en:'I am formally objecting to any disciplinary removal exceeding 10 school days without first convening a Manifestation Determination Review. I am requesting this review be scheduled within 10 school days. I am also requesting documentation of all previous behavioral supports and interventions that were provided under my child\'s IEP.',es:'Me opongo formalmente a cualquier remoción disciplinaria que exceda 10 días escolares sin primero convocar una Revisión de Determinación de Manifestación. Solicito que esta revisión se programe dentro de 10 días escolares.'}},

  { id:108, cat:'participation',
    iconCls:'fa-solid fa-users text-3xl text-teal-500',
    feeling:{en:'"The school held an IEP meeting without me or made decisions before the meeting started."',es:'"La escuela celebró una reunión del IEP sin mí o tomó decisiones antes de que comenzara la reunión."'},

// ── READ ALOUD ENGINE ─────────────────────────────────────────────────────────
function useReadAloud(lang) {
  const [speaking, setSpeaking]   = useState(false);
  const [activeId, setActiveId]   = useState(null);

  const speak = useCallback((text, id) => {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang === 'en' ? 'en-US' : 'es-419';
    u.rate = 0.92;
    u.onstart = () => { setSpeaking(true); setActiveId(id); };
    u.onend   = () => { setSpeaking(false); setActiveId(null); };
    u.onerror = () => { setSpeaking(false); setActiveId(null); };
    window.speechSynthesis.speak(u);
  }, [lang]);

  const stop = useCallback(() => {
    window.speechSynthesis.cancel();
    setSpeaking(false); setActiveId(null);
  }, []);

  return { speak, stop, speaking, activeId };
}

// ── READ ALOUD BUTTON ─────────────────────────────────────────────────────────
function ReadBtn({ text, id, ra, label }) {
  const isActive = ra.activeId === id && ra.speaking;
  return (
    <button
      onClick={() => isActive ? ra.stop() : ra.speak(text, id)}
      aria-label={isActive ? `Stop reading ${label}` : `Read aloud: ${label}`}
      aria-pressed={isActive}
      className={`p-2 rounded-full transition-colors ${isActive ? 'text-sky-600 bg-sky-100' : 'text-slate-400 hover:text-sky-500 hover:bg-sky-50'}`}>
      <i className={`fa-solid ${isActive ? 'fa-stop' : 'fa-volume-high'}`} aria-hidden="true"></i>
    </button>
  );
}

      { id:'end-standard', title:{en:'The "Appropriately Ambitious" Standard',es:'El Estándar "Apropiadamente Ambicioso"'},
        body:{en:'The Court established that goals must be "appropriately ambitious" and that instruction must be "reasonably calculated to enable a child to make progress." The Court clarified that this standard is calibrated to the individual child: "For a child fully integrated in the regular classroom, an IEP typically should, as the statute prescribes, be reasonably calculated to enable the child to achieve passing marks and advance from grade to grade. For a child in a special classroom, advancing from grade to grade will not always be a reasonable expectation. But this should not be confused with permitting a school to offer a trivially advancing IEP." Progress must reflect the child\'s actual potential — not a convenient baseline.',
              es:'La Corte estableció que las metas deben ser "apropiadamente ambiciosas" y que la instrucción debe estar "razonablemente calculada para permitir que un niño progrese." La Corte aclaró que este estándar se calibra al niño individual. El progreso debe reflejar el potencial real del niño, no una línea de base conveniente.'}},

              es:'Después de Endrew F., los siguientes ya no son legalmente aceptables: metas idénticas a las del año anterior sin justificación; IEP que apuntan a un avance mínimo; negativas a actualizar metas incluso cuando un estudiante las ha dominado; y metas que no reflejan el potencial actual del estudiante. La escuela debe poder explicar por qué cada meta está calibrada a las circunstancias individuales de su hijo.'}},
      { id:'end-use', title:{en:'How to Use This Case in Your IEP Meeting',es:'Cómo Usar Este Caso en la Reunión del IEP'},
        body:{en:'You can cite Endrew F. directly: "Under Endrew F. v. Douglas County (2017), my child\'s IEP must be reasonably calculated to enable progress appropriate to their circumstances — not merely trivial advancement. I am requesting that each goal reflect my child\'s current potential and that the team document the basis for concluding that these goals are appropriately ambitious." You do not need an attorney to invoke a Supreme Court standard. It is your legal right.',
              es:'Puede citar Endrew F. directamente: "Bajo Endrew F. v. Douglas County (2017), el IEP de mi hijo debe estar razonablemente calculado para permitir un progreso apropiado a sus circunstancias, no solo un avance trivial. Solicito que cada meta refleje el potencial actual de mi hijo y que el equipo documente la base para concluir que estas metas son apropiadamente ambiciosas." No necesita un abogado para invocar un estándar de la Corte Suprema. Es su derecho legal.'}},

              es:'Una Evaluación Funcional del Comportamiento investiga tres elementos: el Antecedente (qué sucede antes del comportamiento), el Comportamiento (cómo se ve el comportamiento) y la Consecuencia (qué sucede después, qué gana o evita el estudiante). No se puede construir un BIP efectivo sin primero identificar la función.'}},
      { id:'sel-bip', title:{en:'The BIP: Building the Response',es:'El BIP: Construir la Respuesta'},

              es:'Un Plan de Intervención de Comportamiento debe incluir: identificación del comportamiento y su función; estrategias de antecedente (cómo prevenir el comportamiento); estrategias de enseñanza (qué comportamiento de reemplazo se enseñará); estrategias de refuerzo; y protocolos de crisis. Un BIP es un documento legal — cada adulto que trabaja con el estudiante debe implementarlo consistentemente.'}},

          {savedTerms.length > 0 && (
            <div className="print-break">
              <h3 className="text-xl font-bold text-slate-700 mb-4 border-b border-slate-200 pb-2 print:text-black print:border-black">{t('Saved Vocabulary','Vocabulario Guardado')}</h3>
              <ul className="space-y-3">
                {TERMS.filter(x => savedTerms.includes(x.id)).map(term => (
                  <li key={term.id} className={`bg-white p-5 rounded-2xl shadow-sm border-l-8 ${BORDER[term.type]} flex justify-between items-start gap-4 print:border-l-4 print:border-slate-800 print:shadow-none`}>
                    <div>
                      <h4 className="font-bold print:text-black">{term.name[language]} <span className="text-xs font-normal text-slate-400">— {term.alt[language]}</span></h4>
                      <p className="text-slate-600 text-sm mt-1 leading-relaxed print:text-black">{term.def[language]}</p>
                    </div>
                    <button onClick={() => toggleT(term.id)} aria-label={t(`Remove ${term.name[language]}`,`Quitar ${term.name[language]}`)}
                      className="text-slate-300 hover:text-red-500 p-1 shrink-0 print-hidden">
                      <i className="fa-solid fa-xmark text-xl" aria-hidden="true"></i>
                    </button>
                  </li>
                ))}
              </ul>
            </div>
          )}
          {savedScen.length > 0 && (
            <div>
              <h3 className="text-xl font-bold text-slate-700 mb-4 border-b border-slate-200 pb-2 mt-4 print:text-black print:border-black">{t('Saved Action Scripts','Guiones Guardados')}</h3>
              <ul className="space-y-5">
                {SCENARIOS.filter(s => savedScen.includes(s.id)).map(s => (
                  <li key={s.id} className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 print:border-slate-300 print:rounded-lg print:shadow-none print-break">
                    <p className="text-[10px] font-black uppercase text-sky-600 tracking-widest mb-1">{t('Your Script:','Su Guión:')}</p>
                    <p className="font-bold text-slate-800 print:text-black mb-3 leading-relaxed">{s.action[language]}</p>
                    <div className="border-t border-slate-100 pt-3 print:border-slate-300">
                      <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">{t('Legal Basis:','Base Legal:')}</p>
                      <p className="text-sm text-slate-600 print:text-black leading-relaxed">{s.connection[language]}</p>
                    </div>
                    <div className="flex gap-2 mt-4 print-hidden">
                      <button onClick={() => ra.speak(s.action[language], `prep-${s.id}`)} aria-label={t('Read aloud','Leer en voz alta')} className="p-3 bg-slate-50 text-slate-600 hover:text-sky-600 rounded-full"><i className="fa-solid fa-volume-high" aria-hidden="true"></i></button>
                      <button onClick={() => copyText(s.action[language])} aria-label={t('Copy','Copiar')} className="p-3 bg-slate-50 text-slate-600 hover:text-sky-600 rounded-full"><i className="fa-regular fa-copy" aria-hidden="true"></i></button>
                      <a href={getMailtoLink(s.action[language])} aria-label={t('Email','Enviar')} className="p-3 bg-slate-50 text-slate-600 hover:text-emerald-600 rounded-full"><i className="fa-regular fa-envelope" aria-hidden="true"></i></a>
                      <button onClick={() => toggleS(s.id)} aria-label={t('Remove','Quitar')} className="p-2 ml-1 text-slate-300 hover:text-red-500"><i className="fa-solid fa-xmark text-lg" aria-hidden="true"></i></button>
                    </div>
                  </li>
                ))}
              </ul>
            </div>
          )}
        </div>
      )}
    </section>
  );

  // ── RENDER ────────────────────────────────────────────────────────────────
  return (
    <div className={`min-h-screen pb-24 text-slate-800 ${isDyslexic?'dyslexic-mode bg-[#F0F4F8]':'bg-[#FAF9F6]'}`}>
      {toast && (
        <div role="status" aria-live="polite" className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl z-50 flex items-center gap-2 print-hidden">
          <i className="fa-solid fa-check text-emerald-400" aria-hidden="true"></i>{toast}
        </div>
      )}
      <Nav />
      <main id="main-content" tabIndex="-1">
        {view==='home'     && <HomeView />}
        {view==='idea'     && <IdeaView />}
        {view==='endrew'   && <EndrewView />}
        {view==='sel'      && <SelView />}
        {view==='terms'    && <TermsView />}
        {view==='advocacy' && <AdvocacyView />}
        {view==='prep'     && <PrepView />}
      </main>
      <footer className="mt-16 border-t border-slate-200 bg-white py-6 print-hidden" role="contentinfo">
        <div className="max-w-5xl mx-auto px-4 flex flex-col sm:flex-row justify-between items-center gap-3 text-xs text-slate-400">
          <p className="font-medium text-slate-500"><span className="font-bold text-slate-700">The IEP Journey</span> · Bilingual Edition · v2.0 · 2026</p>
          <p>Catrina Wright · NLU/CPS Teacher Residency · SPE-587</p>
          <p>
            <a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank" rel="noopener" aria-label="CC BY-NC 4.0 License" className="hover:text-sky-600 transition-colors">CC BY-NC 4.0</a>
            {' · '}
            <a href="mailto:cwright.specialed@gmail.com" className="hover:text-sky-600 transition-colors">cwright.specialed@gmail.com</a>
          </p>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
